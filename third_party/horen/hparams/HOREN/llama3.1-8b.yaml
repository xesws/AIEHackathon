alg_name: "HOREN"
model_name: "/workspace/hugging_cache/llama3.1-8b-instruct"
device: 0

inner_params:
- model.layers[29].mlp.down_proj.weight

n_iter: 100
edit_lr: 0.1
lora_edit_lr: 0.001

name: Hopfield
adapter_mode: value
val_init: cold
replacement: replace_last
eps: 1.0
dist_fn: euc
eps_expand: variance
num_pert: 8
normalize_codebook_keys: true
query_selection_strategy: last_60_perc_prompt_tokens_avg
query_span_pool_strategy: flat   # chat-path query-span pooling knob (flat=legacy); debug: last_40_perc/last_60_perc/last_80_perc/last

hopfield_retrieval_alpha: 0.1
hopfield_retrieval_beta: 20.0
hopfield_retrieval_eps: 1e-5
hopfield_retrieval_max_iter: 1
hopfield_key_match_threshold: 0.85

lora_rank: 4
lora_scale: 1.0
bf16: true

batch_size: 1
max_length: 512
