<!doctype html>
<!--
  Engram — 前端交互原型 (mock-only).
  保守口径(见 docs/frontend/visual_rcs/DESIGN.md):前端交互为实、后端象征性留白。
  无构建步骤:JSX 由 Babel Standalone 在浏览器内转译;react / lucide-react 经 esm.sh import map;
  Tailwind 只负责 layout/spacing,走 Play CDN。0 网络请求落到后端(serving/app.py 仍为 stub)。
  本地预览:  python3 -m http.server -d frontend 5173   →  http://localhost:5173/
-->
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Engram — continual-learning personal agent (mock)</title>

    <!-- Self-hosted, NO external CDN: Tailwind + React/icons/app are served locally from the
         pod, so the page works on restricted networks that can't reach esm.sh / unpkg / cdn. -->
    <script src="./vendor/tailwind.js"></script>

    <style>
      html, body { margin: 0; background: #EFEDE8; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>本原型需要启用 JavaScript。</noscript>

    <!-- Pre-bundled with esbuild (React + lucide icons + engram.jsx). No in-browser Babel, no CDN.
         Rebuild after editing src/engram.jsx:  esbuild src/engram.jsx --bundle --format=iife
         --minify --define:process.env.NODE_ENV='"production"' --outfile=app.bundle.js -->
    <script src="./app.bundle.js"></script>
  </body>
</html>
